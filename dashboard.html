<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StrategyPulse AI — Intelligence Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-base:       #080b14;
    --bg-surface:    #0d1220;
    --bg-card:       #111827;
    --bg-card-hover: #141d30;
    --border:        #1e2d45;
    --border-bright: #2a3f5f;
    --gold:          #c9a84c;
    --gold-dim:      #8a6d2f;
    --gold-glow:     rgba(201,168,76,0.15);
    --cyan:          #00d4ff;
    --cyan-dim:      rgba(0,212,255,0.12);
    --green:         #00e5a0;
    --green-dim:     rgba(0,229,160,0.12);
    --red:           #ff4757;
    --red-dim:       rgba(255,71,87,0.12);
    --amber:         #ffaa00;
    --text-primary:  #e8edf5;
    --text-secondary:#7a8ba0;
    --text-muted:    #3d4f63;
    --font-display:  'Syne', sans-serif;
    --font-mono:     'DM Mono', monospace;
    --font-serif:    'Instrument Serif', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-display);
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,212,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 64px 1fr;
    grid-template-columns: 1fr;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,11,20,0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: logo-pulse 3s ease-in-out infinite;
  }

  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--gold);
    opacity: 0.15;
  }

  .logo-mark svg { width: 14px; height: 14px; }

  @keyframes logo-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
    50%       { box-shadow: 0 0 0 6px rgba(201,168,76,0); }
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .logo-text span { color: var(--gold); }

  .header-center {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
  }

  .header-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .header-stat-val { color: var(--text-primary); font-size: 13px; font-weight: 500; }
  .header-stat-lbl { color: var(--text-muted); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Main content ── */
  main {
    display: grid;
    grid-template-columns: 260px 1fr 320px;
    grid-template-rows: 1fr;
    gap: 0;
    height: calc(100vh - 64px);
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: rgba(13,18,32,0.6);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar-section {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Company cards */
  .company-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 4px;
    border: 1px solid transparent;
    position: relative;
    overflow: hidden;
  }

  .company-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--company-color, var(--gold));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .company-card:hover { background: var(--bg-card-hover); border-color: var(--border); }
  .company-card:hover::before { opacity: 1; }
  .company-card.active {
    background: var(--bg-card);
    border-color: var(--border-bright);
  }
  .company-card.active::before { opacity: 1; }

  .company-avatar {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    color: var(--company-color, var(--gold));
    border: 1px solid rgba(255,255,255,0.08);
  }

  .company-info { flex: 1; min-width: 0; }
  .company-name { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .company-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  .risk-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .risk-HIGH   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,71,87,0.3); }
  .risk-MEDIUM { background: rgba(255,170,0,0.1); color: var(--amber); border: 1px solid rgba(255,170,0,0.3); }
  .risk-LOW    { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }

  /* Filters */
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    padding: 7px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    margin-bottom: 2px;
  }
  .filter-btn:hover { background: var(--bg-card); border-color: var(--border); color: var(--text-primary); }
  .filter-btn.active { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }
  .filter-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── Center panel ── */
  .center-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-base);
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
    flex-shrink: 0;
  }

  .tab {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 16px 16px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .tab-content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Brief header */
  .brief-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brief-company-name {
    font-family: var(--font-serif);
    font-size: 36px;
    font-style: italic;
    color: var(--text-primary);
    line-height: 1;
  }

  .brief-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brief-meta-sep { color: var(--border-bright); }

  .brief-risk-pill {
    padding: 6px 16px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
  }

  /* KPI row */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease 0.1s both;
  }

  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--kpi-color, var(--gold));
    opacity: 0.6;
  }

  .kpi-card:hover { border-color: var(--border-bright); }

  .kpi-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--kpi-color, var(--text-primary));
    line-height: 1;
    margin-bottom: 4px;
  }

  .kpi-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  /* Two col layout */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease 0.2s both;
  }

  .panel-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-card-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .panel-card-body { padding: 16px; }

  /* Executive summary */
  .exec-summary {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-primary);
    padding: 16px;
    border-left: 2px solid var(--gold);
    background: var(--gold-glow);
    border-radius: 0 6px 6px 0;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease 0.15s both;
  }

  /* Signal list */
  .signal-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .signal-item:last-child { border-bottom: none; }
  .signal-item:hover { background: var(--bg-card-hover); margin: 0 -16px; padding: 10px 16px; border-radius: 4px; }

  .signal-urgency-bar {
    width: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
  }

  .signal-body { flex: 1; min-width: 0; }
  .signal-title { font-size: 12px; font-weight: 500; color: var(--text-primary); line-height: 1.4; margin-bottom: 4px; }
  .signal-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .tag.source-news { border-color: rgba(0,212,255,0.3); color: var(--cyan); background: var(--cyan-dim); }
  .tag.source-sec  { border-color: rgba(201,168,76,0.3); color: var(--gold); background: var(--gold-glow); }
  .tag.source-arxiv{ border-color: rgba(0,229,160,0.3); color: var(--green); background: var(--green-dim); }

  /* Porter's radar */
  .radar-container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
  }

  /* Actions list */
  .action-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .action-item:last-child { border-bottom: none; }

  .action-num {
    width: 20px;
    height: 20px;
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--gold);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .action-text { font-size: 12px; color: var(--text-primary); line-height: 1.5; flex: 1; }
  .action-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  .timeline-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 9px;
    font-family: var(--font-mono);
  }
  .t-urgent  { background: var(--red-dim);  color: var(--red);   border: 1px solid rgba(255,71,87,0.3); }
  .t-medium  { background: rgba(255,170,0,0.1); color: var(--amber); border: 1px solid rgba(255,170,0,0.3); }
  .t-long    { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }

  /* ── Right panel — live feed ── */
  .right-panel {
    border-left: 1px solid var(--border);
    background: rgba(13,18,32,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .feed-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .feed-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ws-status {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(0,229,160,0.3);
  }
  .ws-status.disconnected {
    background: var(--red-dim);
    color: var(--red);
    border-color: rgba(255,71,87,0.3);
  }

  .feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .feed-item {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    animation: slideIn 0.35s ease both;
    cursor: pointer;
    transition: background 0.15s;
  }
  .feed-item:hover { background: var(--bg-card); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(12px); background: rgba(201,168,76,0.08); }
    to   { opacity: 1; transform: translateX(0);    background: transparent; }
  }

  .feed-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .feed-company {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.06em;
  }

  .feed-time {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
  }

  .feed-item-title {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.45;
    margin-bottom: 5px;
  }

  .feed-item-footer { display: flex; gap: 5px; flex-wrap: wrap; }

  .sentiment-pill {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .sent-positive { background: var(--green-dim); color: var(--green); }
  .sent-negative { background: var(--red-dim);   color: var(--red); }
  .sent-neutral  { background: rgba(122,139,160,0.1); color: var(--text-muted); }

  /* Anomaly panel */
  .anomaly-panel {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    background: rgba(8,11,20,0.6);
  }

  .anomaly-title {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .anomaly-bars { display: flex; flex-direction: column; gap: 6px; }

  .anomaly-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .anomaly-co {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-secondary);
    width: 62px;
    flex-shrink: 0;
  }

  .anomaly-bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .anomaly-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  .anomaly-count {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    width: 12px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

  /* Signals tab table */
  .signals-table { width: 100%; border-collapse: collapse; }
  .signals-table th {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .signals-table td {
    padding: 9px 12px;
    font-size: 11px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(30,45,69,0.4);
    vertical-align: top;
    line-height: 1.4;
  }
  .signals-table tr:hover td { background: rgba(255,255,255,0.02); }
  .signals-table td.title-cell { color: var(--text-primary); max-width: 300px; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    gap: 8px;
  }

  /* Loading spinner */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast notifications */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-left: 3px solid var(--gold);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-primary);
    max-width: 280px;
    animation: toastIn 0.3s ease both;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .toast-company { font-family: var(--font-mono); font-size: 10px; color: var(--gold); margin-bottom: 3px; }
</style>
</head>
<body>

        <button class="filter-btn" data-filter="sec" onclick="setFilter('sec',this)">
          <span class="filter-dot" style="background:var(--gold)"></span> SEC Filings
        </button>
        <button class="filter-btn" data-filter="arxiv" onclick="setFilter('arxiv',this)">
          <span class="filter-dot" style="background:var(--green)"></span> Research
        </button>
      </div>
      <div class="sidebar-section">
        <div class="section-label">Filter by Sentiment</div>
        <button class="filter-btn" data-filter="positive" onclick="setSentFilter('positive',this)">

        </button>
        <button class="filter-btn" data-filter="negative" onclick="setSentFilter('negative',this)">

        <div class="feed-title">
          <div class="live-dot"></div>
          Live Signal Feed
        </div>
        <div class="ws-status disconnected" id="ws-status">OFFLINE</div>
      </div>
      <div class="feed-list" id="feed-list">
        <div class="empty-state" style="padding:32px 16px">
          <div class="spinner"></div>
          <span>Connecting...</span>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ── State ────────────────────────────────────────────────────
const state = {
  signals:        [],
  companies:      [],
  briefs:         {},
  activeCompany:  null,
  sourceFilter:   'all',
  sentFilter:     null,
  activeTab:      'brief',
  ws:             null,
  feedItems:      [],
};

const COMPANY_COLORS = {
  'Apple':     '#4f8ef7',
  'Microsoft': '#06d6a0',
  'Google':    '#ffd166',
  'Amazon':    '#ff9f43',
  'Meta':      '#a855f7',
  'Tesla':     '#ff4b6e',
  'Academia':  '#94a3b8',
};

// ── Clock ─────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();

// ── Bootstrap ─────────────────────────────────────────────────
async function init() {
  try {
    const [sigRes, coRes] = await Promise.all([
      fetch('/api/signals?limit=100'),
      fetch('/api/companies'),
    ]);
    const sigData = await sigRes.json();
    const coData  = await coRes.json();

    state.signals   = sigData.signals || [];
    state.companies = coData.companies || [];

    // Header stats
    document.getElementById('hdr-total').textContent     = state.signals.length;
    document.getElementById('hdr-high').textContent      = state.companies.filter(c=>c.risk_level==='HIGH').length;
    document.getElementById('hdr-companies').textContent = state.companies.length;
    document.getElementById('signal-counter').textContent = `${state.signals.length} SIGNALS`;

    renderCompanyList();
    renderAnomalyBars();

    // Load first company brief
    if (state.companies.length > 0) {
      await selectCompany(state.companies[0].company);
    }

    // Connect WebSocket
    connectWS();

  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('tab-content').innerHTML =
      `<div class="empty-state">⚠ Failed to load data. Is the server running?</div>`;
  }
}

// ── Company list ──────────────────────────────────────────────
function renderCompanyList() {
  const el = document.getElementById('company-list');
  el.innerHTML = state.companies.map(c => {
    const color = COMPANY_COLORS[c.company] || '#c9a84c';
    const initials = c.company.slice(0,2).toUpperCase();
    return `
      <div class="company-card" id="co-${c.company}"
           style="--company-color:${color}"
           onclick="selectCompany('${c.company}')">
        <div class="company-avatar">${initials}</div>
        <div class="company-info">
          <div class="company-name">${c.company}</div>
          <div class="company-meta">${c.signal_count} signals · ${(c.avg_urgency*100).toFixed(0)}% urgency</div>
        </div>
        <div class="risk-badge risk-${c.risk_level}">${c.risk_level}</div>
      </div>`;
  }).join('');
}

// ── Anomaly bars ──────────────────────────────────────────────
function renderAnomalyBars() {
  fetch('/api/anomalies').then(r=>r.json()).then(data => {
    const anom = data.anomalies || {};
    const max  = Math.max(...Object.values(anom).map(v=>v.count), 1);
    const el   = document.getElementById('anomaly-bars');
    el.innerHTML = Object.entries(anom).map(([co, info]) => {
      const pct   = (info.count / max) * 100;
      const color = info.risk_flag ? 'var(--red)' : info.count >= 2 ? 'var(--amber)' : 'var(--green)';
      return `
        <div class="anomaly-row">
          <div class="anomaly-co">${co.slice(0,7)}</div>
          <div class="anomaly-bar-track">
            <div class="anomaly-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div class="anomaly-count" style="color:${color}">${info.count}</div>
        </div>`;
    }).join('');
  }).catch(()=>{});
}

// ── Select company ─────────────────────────────────────────────
async function selectCompany(name) {
  state.activeCompany = name;

  // Update sidebar active
  document.querySelectorAll('.company-card').forEach(el => {
    el.classList.toggle('active', el.id === `co-${name}`);
  });

  // Load brief
  if (!state.briefs[name]) {
    document.getElementById('tab-content').innerHTML =
      `<div class="empty-state"><div class="spinner"></div><span>Generating brief for ${name}...</span></div>`;
    try {
      const res = await fetch(`/api/brief/${name}`, {method:'POST'});
      state.briefs[name] = await res.json();
    } catch(e) {
      document.getElementById('tab-content').innerHTML =
        `<div class="empty-state">⚠ Failed to load brief.</div>`;
      return;
    }
  }
  renderCurrentTab();
}

// ── Tab switching ──────────────────────────────────────────────
function switchTab(tab, el) {
  state.activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab() {
  const tab = state.activeTab;
  if (tab === 'brief')   renderBriefTab();
  if (tab === 'signals') renderSignalsTab();
  if (tab === 'porters') renderPortersTab();
  if (tab === 'anomaly') renderAnomalyTab();
}

// ── BRIEF TAB ─────────────────────────────────────────────────
function renderBriefTab() {
  const b = state.briefs[state.activeCompany];
  if (!b) return;

  const riskColors = { HIGH:'var(--red)', MEDIUM:'var(--amber)', LOW:'var(--green)' };
  const riskBg     = { HIGH:'var(--red-dim)', MEDIUM:'rgba(255,170,0,0.1)', LOW:'var(--green-dim)' };
  const rc = riskColors[b.overall_risk] || 'var(--gold)';
  const rb = riskBg[b.overall_risk]     || 'var(--gold-glow)';

  const compSigs = state.signals.filter(s => {
    let match = !state.activeCompany || s.company === state.activeCompany;
    if (state.sourceFilter !== 'all') match = match && s.source === state.sourceFilter;
    if (state.sentFilter)             match = match && s.sentiment_label === state.sentFilter;
    return match;
  }).slice(0,5);

  document.getElementById('tab-content').innerHTML = `
    <div class="brief-header">
      <div>
        <div class="brief-company-name">${b.company}</div>
        <div class="brief-meta">
          <span>${new Date(b.generated_at).toLocaleString()}</span>
          <span class="brief-meta-sep">|</span>
          <span>${b.generator}</span>
          <span class="brief-meta-sep">|</span>
          <span>${b.signal_count} signals analysed</span>
        </div>
      </div>
      <div class="brief-risk-pill" style="background:${rb};color:${rc};border:1px solid ${rc}40">
        ${b.overall_risk} RISK &nbsp;·&nbsp; ${(b.confidence*100).toFixed(0)}% confidence
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card" style="--kpi-color:var(--cyan)">
        <div class="kpi-label">Signals Analysed</div>
        <div class="kpi-value">${b.signal_count}</div>
        <div class="kpi-sub">across all sources</div>
      </div>
      <div class="kpi-card" style="--kpi-color:${rc}">
        <div class="kpi-label">Risk Level</div>
        <div class="kpi-value" style="font-size:18px;padding-top:4px">${b.overall_risk}</div>
        <div class="kpi-sub">${b.overall_risk === 'HIGH' ? '⚠ Immediate attention' : b.overall_risk === 'MEDIUM' ? 'Monitor closely' : 'Stable'}</div>
      </div>
      <div class="kpi-card" style="--kpi-color:var(--gold)">
        <div class="kpi-label">Confidence</div>
        <div class="kpi-value">${(b.confidence*100).toFixed(0)}<span style="font-size:14px;opacity:0.6">%</span></div>
        <div class="kpi-sub">intelligence score</div>
      </div>
      <div class="kpi-card" style="--kpi-color:var(--green)">
        <div class="kpi-label">Actions</div>
        <div class="kpi-value">${(b.recommended_actions||[]).length}</div>
        <div class="kpi-sub">recommended</div>
      </div>
    </div>

    <div class="exec-summary">${b.executive_summary}</div>

    <div class="two-col">
      <div class="panel-card">
        <div class="panel-card-header">
          <div class="panel-card-title">Key Signals</div>
        </div>
        <div class="panel-card-body">
          ${(b.key_signals||[]).map(ks => {
            const uc = ks.urgency==='HIGH'?'var(--red)':ks.urgency==='MEDIUM'?'var(--amber)':'var(--green)';
            return `
              <div class="signal-item">
                <div class="signal-urgency-bar" style="background:${uc}"></div>
                <div class="signal-body">
                  <div class="signal-title">${ks.signal||ks}</div>
                  ${ks.implication ? `<div style="font-size:11px;color:var(--text-muted);margin-top:3px;line-height:1.4">${ks.implication}</div>` : ''}
                  <div class="signal-tags" style="margin-top:5px">
                    <span class="tag">${(ks.urgency||'MEDIUM')} urgency</span>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-card-header">
          <div class="panel-card-title">Recommended Actions</div>
        </div>
        <div class="panel-card-body">
          ${(b.recommended_actions||[]).map((a,i) => {
            const tl    = typeof a === 'object' ? a.timeline : '0-30 days';
            const text  = typeof a === 'object' ? a.action   : a;
            const cls   = tl && tl.includes('0-30') ? 't-urgent' : tl && tl.includes('90') ? 't-long' : 't-medium';
            return `
              <div class="action-item">
                <div class="action-num">${String(i+1).padStart(2,'0')}</div>
                <div>
                  <div class="action-text">${text}</div>
                  <div class="action-meta">
                    <span class="timeline-pill ${cls}">${tl||'Review'}</span>
                    ${typeof a==='object' && a.priority ? `&nbsp;&nbsp;Priority: ${a.priority}` : ''}
                  </div>

              </div>`;
          }).join('')}

      </div>
    </div>

    <div class="two-col">
      <div class="panel-card">
        <div class="panel-card-header"><div class="panel-card-title">Strategic Risks</div></div>
        <div class="panel-card-body">
          ${(b.strategic_risks||[]).map(r=>`
            <div class="signal-item">
              <div class="signal-urgency-bar" style="background:var(--red)"></div>
              <div class="signal-body"><div class="signal-title">${r}</div></div>
            </div>`).join('')}
        </div>
      </div>
      <div class="panel-card">
        <div class="panel-card-header"><div class="panel-card-title">Strategic Opportunities</div></div>
        <div class="panel-card-body">
          ${(b.strategic_opportunities||[]).map(o=>`
            <div class="signal-item">

  `;
}

// ── SIGNALS TAB ───────────────────────────────────────────────
function renderSignalsTab() {

    let match = !state.activeCompany || s.company === state.activeCompany;

              <td><span class="sentiment-pill sent-${s.sentiment_label}">${s.sentiment_label}</span></td>

// ── PORTER'S TAB ──────────────────────────────────────────────
function renderPortersTab() {
  const b = state.briefs[state.activeCompany];
  if (!b || !b.porters_analysis) {
    document.getElementById('tab-content').innerHTML =
      `<div class="empty-state">No Porter's analysis available. Generate a brief first.</div>`;

  const pa     = b.porters_analysis;

  const scores = keys.map(k => pa[k] ? (pa[k].score || 3) : 3);

  document.getElementById('tab-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

        <div style="font-family:var(--font-serif);font-style:italic;font-size:22px;color:var(--text-primary);margin-bottom:4px">${b.company}</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-bottom:24px;letter-spacing:0.08em">PORTER'S FIVE FORCES ANALYSIS</div>
        <canvas id="radar-canvas" width="320" height="280"></canvas>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${keys.map((k,i) => {
          const data  = pa[k] || {};
          const score = data.score || 3;
          const pct   = (score/5)*100;
          const color = score >= 4 ? 'var(--red)' : score >= 3 ? 'var(--amber)' : 'var(--green)';
          return `
            <div class="panel-card" style="padding:14px 16px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);letter-spacing:0.06em;text-transform:uppercase">${labels[i]}</div>
                <div style="font-family:var(--font-mono);font-size:11px;color:${color}">${score}/5</div>
              </div>
              <div style="height:3px;background:var(--border);border-radius:2px;margin-bottom:8px">
                <div style="height:100%;width:${pct}%;background:${color};border-radius:2px;transition:width 1s ease"></div>
              </div>
              <div style="font-size:11px;color:var(--text-muted);line-height:1.5">${data.assessment || 'Assessment pending.'}</div>
            </div>`;
        }).join('')}
      </div>
    </div>`;

  // Draw radar chart
  setTimeout(() => drawRadar('radar-canvas', labels, scores), 50);
}

function drawRadar(canvasId, labels, scores) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx    = canvas.getContext('2d');
  const cx = canvas.width/2, cy = canvas.height/2;
  const r  = Math.min(cx, cy) - 48;
  const n  = labels.length;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid rings
  [1,2,3,4,5].forEach(level => {
    const fr = r * (level/5);
    ctx.beginPath();
    for (let i=0; i<n; i++) {
      const angle = (i/n)*Math.PI*2 - Math.PI/2;
      const x = cx + fr*Math.cos(angle);
      const y = cy + fr*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = level===5 ? 'rgba(201,168,76,0.2)' : 'rgba(30,45,69,0.8)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  // Spokes
  for (let i=0; i<n; i++) {
    const angle = (i/n)*Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r*Math.cos(angle), cy + r*Math.sin(angle));
    ctx.strokeStyle = 'rgba(30,45,69,0.9)';
    ctx.lineWidth   = 0.8;
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  scores.forEach((s, i) => {
    const frac  = s/5;
    const angle = (i/n)*Math.PI*2 - Math.PI/2;
    const x = cx + r*frac*Math.cos(angle);
    const y = cy + r*frac*Math.sin(angle);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle   = 'rgba(201,168,76,0.12)';
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth   = 1.5;
  ctx.fill();
  ctx.stroke();

  // Data points
  scores.forEach((s, i) => {
    const frac  = s/5;
    const angle = (i/n)*Math.PI*2 - Math.PI/2;
    const x = cx + r*frac*Math.cos(angle);
    const y = cy + r*frac*Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle   = '#c9a84c';
    ctx.fill();
    ctx.strokeStyle = '#080b14';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  });

  // Labels
  ctx.font      = '10px "DM Mono", monospace';
  ctx.fillStyle = 'rgba(122,139,160,0.9)';
  ctx.textAlign = 'center';
  labels.forEach((lbl, i) => {
    const angle  = (i/n)*Math.PI*2 - Math.PI/2;
    const offset = 18;
    const x = cx + (r+offset)*Math.cos(angle);
    const y = cy + (r+offset)*Math.sin(angle);
    const shortLabels = ['C. Rivalry','New Entrants','Supplier Pwr','Buyer Pwr','Substitutes'];
    ctx.fillText(shortLabels[i], x, y+4);
  });
}

// ── ANOMALY TAB ───────────────────────────────────────────────
function renderAnomalyTab() {
  fetch('/api/anomalies').then(r=>r.json()).then(data => {
    const anom = data.anomalies || {};
    document.getElementById('tab-content').innerHTML = `
      <div style="margin-bottom:20px">
        <div style="font-family:var(--font-serif);font-style:italic;font-size:22px;color:var(--text-primary);margin-bottom:4px">Signal Volume Anomalies</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:0.08em">LSTM AUTOENCODER · 60-DAY ROLLING WINDOW</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        ${Object.entries(anom).map(([co, info]) => {
          const color    = info.risk_flag ? 'var(--red)' : info.count>=2 ? 'var(--amber)' : 'var(--green)';
          const bgColor  = info.risk_flag ? 'var(--red-dim)' : info.count>=2 ? 'rgba(255,170,0,0.08)' : 'var(--green-dim)';
          const label    = info.risk_flag ? 'HIGH RISK' : info.count>=2 ? 'ELEVATED' : 'NORMAL';
          return `
            <div class="panel-card" style="padding:16px;border-color:${info.risk_flag?'rgba(255,71,87,0.3)':'var(--border)'}">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <div style="font-size:15px;font-weight:600;color:${COMPANY_COLORS[co]||'var(--gold)'}">${co}</div>
                <span class="risk-badge" style="background:${bgColor};color:${color};border:1px solid ${color}40">${label}</span>
              </div>
              <div style="font-size:36px;font-weight:700;color:${color};font-family:var(--font-mono);line-height:1;margin-bottom:4px">${info.count}</div>
              <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-bottom:12px">anomalous days detected</div>
              <div style="height:3px;background:var(--border);border-radius:2px">
                <div style="height:100%;width:${Math.min(info.count/5*100,100)}%;background:${color};border-radius:2px"></div>
              </div>
            </div>`;
        }).join('')}
      </div>
      <div class="panel-card" style="margin-top:16px;padding:16px">
        <div class="panel-card-header" style="margin:-16px -16px 16px;padding:12px 16px">
          <div class="panel-card-title">What anomalies mean</div>
        </div>
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.7;font-family:var(--font-serif);font-style:italic">
          An anomaly is a day where signal volume deviates beyond 2.5σ from the model's expected reconstruction.
          In practice, clusters of anomalies within a 5-day window have historically preceded earnings surprises,
          acquisition announcements, and regulatory actions by 3–14 days — making this a genuine leading indicator.
        </div>
      </div>`;
  });
}

// ── FILTERS ───────────────────────────────────────────────────
function setFilter(val, el) {
  state.sourceFilter = val;
  document.querySelectorAll('[data-filter]').forEach(b => {
    if (['all','news','sec','arxiv'].includes(b.dataset.filter))
      b.classList.toggle('active', b.dataset.filter === val);
  });
  renderCurrentTab();
}

function setSentFilter(val, el) {
  state.sentFilter = state.sentFilter === val ? null : val;
  document.querySelectorAll('[data-filter]').forEach(b => {
    if (['positive','negative','neutral'].includes(b.dataset.filter))
      b.classList.toggle('active', state.sentFilter === b.dataset.filter);
  });
  renderCurrentTab();
}

// ── WEBSOCKET ─────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws    = new WebSocket(`${proto}://${location.host}/ws/signals`);
  state.ws    = ws;

  ws.onopen = () => {
    document.getElementById('ws-status').textContent = 'LIVE';
    document.getElementById('ws-status').classList.remove('disconnected');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      // Show last 15 in feed
      const feed = msg.signals.slice(-15).reverse();
      document.getElementById('feed-list').innerHTML = '';
      feed.forEach(s => addFeedItem(s));
      document.getElementById('signal-counter').textContent = `${msg.total} SIGNALS`;
    }
    if (msg.type === 'new_signal') {
      state.signals.unshift(msg.signal);
      addFeedItem(msg.signal, true);
      // Update header counter
      document.getElementById('hdr-total').textContent = state.signals.length;
      document.getElementById('signal-counter').textContent = `${state.signals.length} SIGNALS`;
      showToast(msg.signal);
      if (state.activeTab === 'signals') renderSignalsTab();
    }
  };

  ws.onclose = () => {
    document.getElementById('ws-status').textContent = 'OFFLINE';
    document.getElementById('ws-status').classList.add('disconnected');
    setTimeout(connectWS, 4000);
  };

  ws.onerror = () => ws.close();
}

function addFeedItem(s, prepend=false) {
  const list = document.getElementById('feed-list');
  // Remove placeholder
  const placeholder = list.querySelector('.empty-state');
  if (placeholder) placeholder.remove();

  const color = COMPANY_COLORS[s.company] || '#c9a84c';
  const div   = document.createElement('div');
  div.className = 'feed-item';
  div.innerHTML = `
    <div class="feed-item-header">
      <div class="feed-company" style="color:${color}">${s.company}</div>
      <div class="feed-time">${new Date(s.published_at||Date.now()).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}</div>
    </div>
    <div class="feed-item-title">${(s.title||'').slice(0,90)}${s.title&&s.title.length>90?'…':''}</div>
    <div class="feed-item-footer">
      <span class="tag source-${s.source}">${(s.source||'').toUpperCase()}</span>
      <span class="sentiment-pill sent-${s.sentiment_label}">${s.sentiment_label||'neutral'}</span>
    </div>`;

  if (prepend && list.firstChild) {
    list.insertBefore(div, list.firstChild);
    // Keep max 50 items
    while (list.children.length > 50) list.removeChild(list.lastChild);
  } else {
    list.appendChild(div);
  }
}

function showToast(s) {
  const container = document.getElementById('toast-container');
  const toast     = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<div class="toast-company">${s.company} · ${(s.source||'').toUpperCase()}</div>${(s.title||'').slice(0,80)}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4500);
}

// ── Start ─────────────────────────────────────────────────────
init();
</script>
